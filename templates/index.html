<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .box {
            width: 200px;
            height: 100px;
            border: 2px black solid;
        }
    </style>   
    <meta charset="UTF-8">
    <meta http-equiv="X-UA_Compatible" content=""IE=edge">
    <meta name="viewport" content=""width=device-width, initial-scale="1.0">
    <title>Document</title>
    <title>Manifold Predictor</title>
</head>

<body>
    <h1>Manifold Predictor</h1>

        <input type = "text" id = "marketInput" placeholder = "What should i predict today?" >
    <button style="font-size:25px" id = "analyzeBtn" >Analyze</button>
    <b>
    </b><br />
    <div class="box" id = "box"></div>
    <script>
        const analyzeBtn = document.querySelector("#analyzeBtn");
        const marketInput = document.querySelector("#marketInput");
        const Box = document.querySelector("#box");

        analyzeBtn.addEventListener("click", async() => {
            try{
               const apiResponse = await fetch('http://127.0.0.1:5000/analyze',{   
                    headers: {'Content-Type': 'application/json'},
                    method : 'POST',
                    body : JSON.stringify({
                    market_id: marketInput.value    
                    })
                })
                const data = await apiResponse.json()
                console.log(data)
                Box.innerHTML = `Question: ${data.question} - Manifold Yes: ${data.manifold_yes}% No: ${data.manifold_no}% - Claude Yes: ${data.claude_yes}% No: ${data.claude_no}%`
               console.log('response', );
            } catch(error){
              console.log('Error occured' , error);
            }
    });
    </script>
</body>
</html>
